services:
  php:
    build:
      context: ./docker/php
      args:
        XDEBUG: ${XDEBUG:-0}
        COMPOSER: ${COMPOSER:-0}
    volumes:
      - ./src:/src
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    environment:
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:8080/}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-dbuser}
      DB_PASS: ${DB_PASS:?Set DB_PASS in .env}
      DB_NAME: ${DB_NAME:-dbapp}
    depends_on:
      db:
        condition: service_healthy
 
  web:
    build:
      context: ./docker/apache
    ports:
      - "${HTTP_PORT_EXPOSED:-8080}:80"
    volumes:
      - ./src:/src:ro
      - ./docker/apache/webapp.conf:/usr/local/apache2/conf/webapp.conf:ro
    depends_on:
      php:
        condition: service_started

  db:
    build:
      context: ./docker/mariadb
    ports:
      - "127.0.0.1:${DB_PORT_EXPOSED:-3306}:3306"
    volumes:
      - ./db:/var/lib/mysql
      # Enable to import SQL files when a new, empty database is created:
      # - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    environment:
      TZ: ${TIME_ZONE:-UTC}
      MARIADB_ROOT_PASSWORD: ${DB_ROOTPASS:?Set DB_ROOTPASS in .env}
      MARIADB_DATABASE: ${DB_NAME:-dbapp}
      MARIADB_USER: ${DB_USER:-dbuser}
      MARIADB_PASSWORD: ${DB_PASS:?Set DB_PASS in .env}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
